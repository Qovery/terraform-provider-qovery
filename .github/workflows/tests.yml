name: Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - ".gitignore"
  schedule:
    - cron: "0 9 * * 1-5" # 9:00 UTC, Mon-Fri

permissions:
  contents: read

env:
  TASK_VERSION: 3.x

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out source code
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Set up Task
        uses: arduino/setup-task@v2
        with:
          version: ${{ env.TASK_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        run: task build

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out source code
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Set up Task
        uses: arduino/setup-task@v2
        with:
          version: ${{ env.TASK_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Lint
        run: task lint-check

  generate:
    name: Verify Generated Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source code
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - name: Set up Task
        uses: arduino/setup-task@v2
        with:
          version: ${{ env.TASK_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify documentation is up to date
        env:
          QOVERY_API_TOKEN: ${{ secrets.QOVERY_API_TOKEN }}
        run: |
          task docs
          git diff --compact-summary --exit-code || \
            (echo; echo "Documentation is out of date. Run 'task docs' and commit."; exit 1)

  mocks:
    name: Verify Generated Mocks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source code
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Set up Task
        uses: arduino/setup-task@v2
        with:
          version: ${{ env.TASK_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify mocks are up to date
        run: |
          task mocks
          git diff --compact-summary --exit-code || \
            (echo; echo "Mocks are out of date. Run 'task mocks' and commit."; exit 1)

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source code
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Set up Task
        uses: arduino/setup-task@v2
        with:
          version: ${{ env.TASK_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run unit tests
        run: task test

  test:
    name: Acceptance Tests (Terraform ${{ matrix.terraform }})
    needs: unit-test
    runs-on: ubuntu-latest
    timeout-minutes: 130
    strategy:
      fail-fast: true
      matrix:
        terraform: ["1.12.*", "1.13.*", "1.14.*"]
      max-parallel: 1
    steps:
      - name: Check out source code
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Set up Terraform ${{ matrix.terraform }}
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ matrix.terraform }}
          terraform_wrapper: false
      - name: Set up Task
        uses: arduino/setup-task@v2
        with:
          version: ${{ env.TASK_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run acceptance tests
        timeout-minutes: 120
        env:
          TF_ACC: "1"
          QOVERY_API_TOKEN: ${{ secrets.QOVERY_API_TOKEN }}
          TEST_ORGANIZATION_ID: ${{ secrets.TEST_ORGANIZATION_ID }}
          TEST_AWS_CREDENTIALS_ID: ${{ secrets.TEST_AWS_CREDENTIALS_ID }}
          TEST_AWS_CREDENTIALS_ACCESS_KEY_ID: ${{ secrets.TEST_AWS_CREDENTIALS_ACCESS_KEY_ID }}
          TEST_AWS_CREDENTIALS_SECRET_ACCESS_KEY: ${{ secrets.TEST_AWS_CREDENTIALS_SECRET_ACCESS_KEY }}
          TEST_SCALEWAY_CREDENTIALS_ID: ${{ secrets.TEST_SCALEWAY_CREDENTIALS_ID }}
          TEST_SCALEWAY_CREDENTIALS_PROJECT_ID: ${{ secrets.TEST_SCALEWAY_CREDENTIALS_PROJECT_ID }}
          TEST_SCALEWAY_CREDENTIALS_ORGANIZATION_ID: ${{ secrets.TEST_SCALEWAY_CREDENTIALS_ORGANIZATION_ID }}
          TEST_SCALEWAY_CREDENTIALS_ACCESS_KEY: ${{ secrets.TEST_SCALEWAY_CREDENTIALS_ACCESS_KEY }}
          TEST_SCALEWAY_CREDENTIALS_SECRET_KEY: ${{ secrets.TEST_SCALEWAY_CREDENTIALS_SECRET_KEY }}
          TEST_CLUSTER_ID: ${{ secrets.TEST_CLUSTER_ID }}
          TEST_PROJECT_ID: ${{ secrets.TEST_PROJECT_ID }}
          TEST_ENVIRONMENT_ID: ${{ secrets.TEST_ENVIRONMENT_ID }}
          TEST_APPLICATION_ID: ${{ secrets.TEST_APPLICATION_ID }}
          TEST_DATABASE_ID: ${{ secrets.TEST_DATABASE_ID }}
          TEST_CONTAINER_REGISTRY_ID: ${{ secrets.TEST_CONTAINER_REGISTRY_ID }}
          TEST_CONTAINER_ID: ${{ secrets.TEST_CONTAINER_ID }}
          TEST_JOB_ID: ${{ secrets.TEST_JOB_ID }}
          TEST_HELM_ID: ${{ secrets.TEST_HELM_ID }}
          TEST_HELM_REPOSITORY_ID: ${{ secrets.TEST_HELM_REPOSITORY_ID }}
          TEST_AWS_ECR_URL: ${{ secrets.TEST_AWS_ECR_URL }}
          TEST_QOVERY_HOST: ${{ secrets.TEST_QOVERY_HOST }}
          TEST_QOVERY_SANDBOX_GIT_TOKEN_ID: ${{ secrets.TEST_QOVERY_SANDBOX_GIT_TOKEN_ID }}
          TEST_ANNOTATIONS_GROUP_ID: ${{ secrets.TEST_ANNOTATIONS_GROUP_ID }}
          TEST_LABELS_GROUP_ID: ${{ secrets.TEST_LABELS_GROUP_ID }}
          TEST_GCP_CREDENTIALS_ID: ${{ secrets.TEST_GCP_CREDENTIALS_ID }}
          TEST_GCP_CREDENTIALS: ${{ secrets.TEST_GCP_CREDENTIALS }}
          TEST_AZURE_CREDENTIALS_ID: ${{ secrets.TEST_AZURE_CREDENTIALS_ID }}
        run: task testacc

  notify-slack:
    name: Notify Slack
    needs: [test]
    if: always() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ needs.test.result == 'success' && ':white_check_mark:' || ':x:' }} *Scheduled Terraform Provider Tests*\nStatus: *${{ needs.test.result }}*"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\nmain"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Trigger:*\nScheduled (9:00 UTC)"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Run"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
