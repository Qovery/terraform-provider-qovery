run:
  timeout: 60m

issues:
  max-per-linter: 0
  max-same-issues: 0
  # Legacy packages (pre-DDD): mute noisy linters here, then re-enable
  # one at a time as the underlying issues are cleaned up.
  exclude-rules:
    - path: "^(qovery|client)/"
      linters:
        - unused

linters:
  disable-all: true
  enable:
    - asciicheck
    - errcheck
    - gocritic
    - gofmt
    - goimports
    - govet
    - ineffassign
    - nakedret
    - misspell
    - staticcheck
    - typecheck
    - unused
    - unconvert
    - unparam
    - whitespace
    - revive
    - gofumpt

linters-settings:
  nakedret:
    max-func-lines: 40
  revive:
    rules:
      - name: var-naming
        disabled: true
